version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: upi_postgres
    environment:
      POSTGRES_DB: upi-secure-pay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shivam@12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: upi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: upi_backend
    environment:
      - DATABASE_URL=postgresql://postgres:Shivam%4012345@postgres:5432/upi-secure-pay
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/lgbm_fraud_model.pkl:/app/lgbm_fraud_model.pkl
      - ./backend/lgbm_features.json:/app/lgbm_features.json
      - ./backend/lstm_model.pth:/app/lstm_model.pth

  frontend:
    build: ./dashboard
    container_name: upi_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
